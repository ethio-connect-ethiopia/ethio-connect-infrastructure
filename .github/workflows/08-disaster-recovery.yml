name: Disaster Recovery

on:
  workflow_dispatch:
    inputs:
      action:
        description: DR action to perform
        required: true
        type: choice
        options:
          - backup
          - restore
          - status
          - verify-backup
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - testing
          - staging
          - prod
      backup_name:
        description: Backup name to restore (for restore action)
        required: false
        type: string
        default: ""
      skip_prompts:
        description: Skip confirmation prompts
        type: boolean
        default: false

env:
  VELERO_VERSION: v1.14.1
  KUBECTL_VERSION: v1.31.0

jobs:
  backup:
    name: Create Backup
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: ${{ inputs.environment }}
    if: inputs.action == 'backup'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: ${{ env.KUBECTL_VERSION }}

      - name: Configure kubectl
        run: |
          case "${{ inputs.environment }}" in
            testing)
              echo "${{ secrets.KUBECONFIG_TESTING }}" | base64 -d > /tmp/kubeconfig
              ;;
            staging)
              echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > /tmp/kubeconfig
              ;;
            prod)
              echo "${{ secrets.KUBECONFIG_PROD }}" | base64 -d > /tmp/kubeconfig
              ;;
          esac
          echo "KUBECONFIG=/tmp/kubeconfig" >> "$GITHUB_ENV"

      - name: Install Velero CLI
        run: |
          curl -sLO "https://github.com/vmware-tanzu/velero/releases/download/${VELERO_VERSION}/velero-${VELERO_VERSION}-linux-amd64.tar.gz"
          tar -xzf "velero-${VELERO_VERSION}-linux-amd64.tar.gz"
          sudo install -o root -g root -m 555 velero /usr/local/bin/velero
          rm -f velero "velero-${VELERO_VERSION}-linux-amd64.tar.gz"
          velero version

      - name: Create backup
        id: create-backup
        run: |
          BACKUP_NAME="ethio-connect-${{ inputs.environment }}-$(date +%Y%m%d-%H%M%S)"
          echo "backup_name=$BACKUP_NAME" >> "$GITHUB_OUTPUT"
          
          velero backup create "$BACKUP_NAME" \
            --include-namespaces ethio-connect-* \
            --exclude-namespaces velero \
            --default-volumes-to-fs-backup \
            --wait
          
          velero backup describe "$BACKUP_NAME" --details

      - name: Upload backup to artifact
        uses: actions/upload-artifact@v4
        with:
          name: backup-manifest-${{ inputs.environment }}
          path: |
            /tmp/backup-${{ steps.create-backup.outputs.backup_name }}.json
          retention-days: 30

      - name: Backup summary
        run: |
          echo "## Backup Created" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Property | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Name | \`${{ steps.create-backup.outputs.backup_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | \`${{ inputs.environment }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Timestamp | $(date -u +"%Y-%m-%d %H:%M:%S UTC") |" >> "$GITHUB_STEP_SUMMARY"

  restore:
    name: Restore from Backup
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: ${{ inputs.environment }}
    if: inputs.action == 'restore'
    steps:
      - name: Confirmation check
        if: ${{ inputs.skip_prompts == 'false' }}
        run: |
          echo "::warning::This will restore from backup to ${{ inputs.environment }} environment"
          echo "This action is destructive and will overwrite current state"
          if [ "${{ inputs.environment }}" = "prod" ]; then
            echo "::error::Cannot restore production without confirmation"
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: ${{ env.KUBECTL_VERSION }}

      - name: Configure kubectl
        run: |
          case "${{ inputs.environment }}" in
            testing)
              echo "${{ secrets.KUBECONFIG_TESTING }}" | base64 -d > /tmp/kubeconfig
              ;;
            staging)
              echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > /tmp/kubeconfig
              ;;
            prod)
              echo "${{ secrets.KUBECONFIG_PROD }}" | base64 -d > /tmp/kubeconfig
              ;;
          esac
          echo "KUBECONFIG=/tmp/kubeconfig" >> "$GITHUB_ENV"

      - name: Install Velero CLI
        run: |
          curl -sLO "https://github.com/vmware-tanzu/velero/releases/download/${VELERO_VERSION}/velero-${VELERO_VERSION}-linux-amd64.tar.gz"
          tar -xzf "velero-${VELERO_VERSION}-linux-amd64.tar.gz"
          sudo install -o root -g root -m 555 velero /usr/local/bin/velero
          rm -f velero "velero-${VELERO_VERSION}-linux-amd64.tar.gz"

      - name: List available backups
        run: |
          velero backup get

      - name: Restore from backup
        run: |
          BACKUP_NAME="${{ inputs.backup_name }}"
          if [ -z "$BACKUP_NAME" ]; then
            echo "::error::No backup name specified"
            exit 1
          fi
          
          echo "Restoring from backup: $BACKUP_NAME"
          velero restore create "restore-$BACKUP_NAME-$(date +%s)" \
            --from-backup "$BACKUP_NAME" \
            --wait
          
          velero restore describe "restore-$BACKUP_NAME-$(date +%s)" --details || true

  status:
    name: DR Status
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ inputs.environment }}
    if: inputs.action == 'status'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: ${{ env.KUBECTL_VERSION }}

      - name: Configure kubectl
        run: |
          case "${{ inputs.environment }}" in
            testing)
              echo "${{ secrets.KUBECONFIG_TESTING }}" | base64 -d > /tmp/kubeconfig
              ;;
            staging)
              echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > /tmp/kubeconfig
              ;;
            prod)
              echo "${{ secrets.KUBECONFIG_PROD }}" | base64 -d > /tmp/kubeconfig
              ;;
          esac
          echo "KUBECONFIG=/tmp/kubeconfig" >> "$GITHUB_ENV"

      - name: Install Velero CLI
        run: |
          curl -sLO "https://github.com/vmware-tanzu/velero/releases/download/${VELERO_VERSION}/velero-${VELERO_VERSION}-linux-amd64.tar.gz"
          tar -xzf "velero-${VELERO_VERSION}-linux-amd64.tar.gz"
          sudo install -o root -g root -m 555 velero /usr/local/bin/velero
          rm -f velero "velero-${VELERO_VERSION}-linux-amd64.tar.gz"

      - name: Get backup status
        run: |
          echo "## Disaster Recovery Status - ${{ inputs.environment }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          
          echo "### Backups" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          velero backup get | head -20 >> "$GITHUB_STEP_SUMMARY"
          
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Restores" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          velero restore get | head -20 >> "$GITHUB_STEP_SUMMARY"

      - name: Get cluster resources status
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Namespace Resources" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          kubectl get namespaces | grep ethio-connect >> "$GITHUB_STEP_SUMMARY"
