apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: ingress-nginx
    repo: https://kubernetes.github.io/ingress-nginx
    version: 4.10.0
    releaseName: ingress-nginx
    namespace: ingress-nginx
    valuesInline:
      controller:
        extraArgs:
          update-status: "true"
        service:
          type: LoadBalancer
          externalTrafficPolicy: Local
