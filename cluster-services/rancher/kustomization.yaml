apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: rancher
    repo: https://releases.rancher.com/server-charts/stable
    version: 2.8.2
    releaseName: rancher
    namespace: cattle-system
    valuesInline:
      hostname: rancher.ethioconnect.et
      bootstrapPassword: admin # default booster password, change in production
      ingress:
        tls:
          source: rancher
