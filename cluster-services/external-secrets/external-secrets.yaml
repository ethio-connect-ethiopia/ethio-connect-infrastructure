apiVersion: v1
kind: Namespace
metadata:
  name: external-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: ethio-connect-vault
  namespace: external-secrets
spec:
  type: hashicorpvault
  path: secret
  version: v2
  vault:
    server: "http://vault.vault:8200"
    path: "secret"
    auth:
      kubernetes:
        mountPath: kubernetes
        role: ethio-connect
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ethio-connect-runtime-secrets
  namespace: ethio-connect-central
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: ethio-connect-vault
    kind: ClusterSecretStore
  target:
    name: ethio-connect-runtime-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
  - secretKey: DATABASE_URL
    remoteRef:
      key: ethio-connect/runtime
      property: DATABASE_URL
  - secretKey: REDIS_URL
    remoteRef:
      key: ethio-connect/runtime
      property: REDIS_URL
  - secretKey: JWT_SECRET
    remoteRef:
      key: ethio-connect/runtime
      property: JWT_SECRET
  - secretKey: API_KEY
    remoteRef:
      key: ethio-connect/runtime
      property: API_KEY
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ethio-connect-runtime-secrets
  namespace: ethio-connect-tenant
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: ethio-connect-vault
    kind: ClusterSecretStore
  target:
    name: ethio-connect-runtime-secrets
    creationPolicy: Owner
  data:
  - secretKey: DATABASE_URL
    remoteRef:
      key: ethio-connect/runtime
      property: DATABASE_URL
  - secretKey: REDIS_URL
    remoteRef:
      key: ethio-connect/runtime
      property: REDIS_URL
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ethio-connect-runtime-secrets
  namespace: ethio-connect-provider
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: ethio-connect-vault
    kind: ClusterSecretStore
  target:
    name: ethio-connect-runtime-secrets
    creationPolicy: Owner
  data:
  - secretKey: DATABASE_URL
    remoteRef:
      key: ethio-connect/runtime
      property: DATABASE_URL
  - secretKey: REDIS_URL
    remoteRef:
      key: ethio-connect/runtime
      property: REDIS_URL
