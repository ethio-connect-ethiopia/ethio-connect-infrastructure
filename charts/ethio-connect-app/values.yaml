# Default replica count. Set to >= 2 in production for zero-downtime rolling updates.
replicaCount: 1

image:
  repository: ghcr.io/primewale/central-hub-api
  pullPolicy: IfNotPresent
  tag: "" # CI/CD writes the active environment tag into environments/<env>/values.yaml

imagePullSecrets:
  - name: ghcr-creds

container:
  port: 3000

# Inline environment variables (rarely needed — prefer envFrom below)
env: []

# ConfigMaps and Secrets to mount as environment variables via envFrom.
# Both lists support multiple entries.
envFrom:
  configMaps:
    - ethio-connect-runtime-config
  secrets:
    - ethio-connect-runtime-secrets

service:
  enabled: true
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: hub-api.ethioconnect.et
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: ethioconnect-et-wildcard-tls
      hosts:
        - "*.ethioconnect.et"

# Resource requests and limits.
# This cluster is a showcase/test environment, so every branch uses the same minimum profile.
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

# Liveness probe: restarts the container if the app becomes unresponsive.
# Adjust initialDelaySeconds to match the application startup time.
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 15
  periodSeconds: 20
  failureThreshold: 3
  timeoutSeconds: 5

# Readiness probe: gates traffic until the app is ready to serve requests.
readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 3

# Pod-level security context.
podSecurityContext: {}

# Container-level security context.
containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
