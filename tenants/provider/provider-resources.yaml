apiVersion: v1
kind: Namespace
metadata:
  name: ethio-connect-provider
  labels:
    ethio-connect/tenant: provider
    ethio-connect/tier: platform
    kubernetes.io/metadata.name: ethio-connect-provider
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: provider-sa
  namespace: ethio-connect-provider
  labels:
    ethio-connect/tenant: provider
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: provider-admin
  namespace: ethio-connect-provider
  labels:
    ethio-connect/tenant: provider
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: provider-admin-binding
  namespace: ethio-connect-provider
  labels:
    ethio-connect/tenant: provider
subjects:
- kind: ServiceAccount
  name: provider-sa
  namespace: ethio-connect-provider
roleRef:
  kind: Role
  name: provider-admin
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: provider-quota
  namespace: ethio-connect-provider
  labels:
    ethio-connect/tenant: provider
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    pods: "30"
    services: "15"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: provider-limits
  namespace: ethio-connect-provider
  labels:
    ethio-connect/tenant: provider
spec:
  limits:
  - type: Container
    default:
      cpu: 500m
      memory: 512Mi
    defaultRequest:
      cpu: 100m
      memory: 128Mi
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: provider-default-deny
  namespace: ethio-connect-provider
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
