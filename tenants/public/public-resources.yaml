apiVersion: v1
kind: Namespace
metadata:
  name: ethio-connect-public
  labels:
    ethio-connect/tenant: public
    ethio-connect/tier: public
    kubernetes.io/metadata.name: ethio-connect-public
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: public-quota
  namespace: ethio-connect-public
  labels:
    ethio-connect/tenant: public
spec:
  hard:
    requests.cpu: "1"
    requests.memory: 2Gi
    limits.cpu: "2"
    limits.memory: 4Gi
    pods: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: public-limits
  namespace: ethio-connect-public
  labels:
    ethio-connect/tenant: public
spec:
  limits:
  - type: Container
    default:
      cpu: 200m
      memory: 256Mi
    defaultRequest:
      cpu: 50m
      memory: 64Mi
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: public-default-deny
  namespace: ethio-connect-public
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
