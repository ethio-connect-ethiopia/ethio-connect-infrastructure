apiVersion: v1
kind: Namespace
metadata:
  name: ethio-connect-tenant
  labels:
    ethio-connect/tenant: tenant
    ethio-connect/tier: platform
    kubernetes.io/metadata.name: ethio-connect-tenant
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tenant-sa
  namespace: ethio-connect-tenant
  labels:
    ethio-connect/tenant: tenant
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tenant-developer
  namespace: ethio-connect-tenant
  labels:
    ethio-connect/tenant: tenant
rules:
- apiGroups: [""]
  resources: ["*"]
  verbs: ["*"]
- apiGroups: ["apps"]
  resources: ["*"]
  verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tenant-developer-binding
  namespace: ethio-connect-tenant
  labels:
    ethio-connect/tenant: tenant
subjects:
- kind: ServiceAccount
  name: tenant-sa
  namespace: ethio-connect-tenant
roleRef:
  kind: Role
  name: tenant-developer
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: tenant-quota
  namespace: ethio-connect-tenant
  labels:
    ethio-connect/tenant: tenant
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 4Gi
    limits.cpu: "4"
    limits.memory: 8Gi
    pods: "20"
    services: "10"
    persistentvolumeclaims: "5"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: tenant-limits
  namespace: ethio-connect-tenant
  labels:
    ethio-connect/tenant: tenant
spec:
  limits:
  - type: Container
    default:
      cpu: 250m
      memory: 256Mi
    defaultRequest:
      cpu: 50m
      memory: 64Mi
    max:
      cpu: "1"
      memory: 2Gi
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tenant-default-deny
  namespace: ethio-connect-tenant
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tenant-allow-central-communication
  namespace: ethio-connect-tenant
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          ethio-connect/tenant: central
    ports:
    - protocol: TCP
      port: 8080
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          ethio-connect/tenant: central
    ports:
    - protocol: TCP
      port: 8080
