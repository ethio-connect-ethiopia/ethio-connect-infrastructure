apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: central-tenant-default-deny
  namespace: ethio-connect-central
  labels:
    ethio-connect/tenant: central
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: central-allow-ingress
  namespace: ethio-connect-central
  labels:
    ethio-connect/tenant: central
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: backend
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8080
    - protocol: TCP
      port: 8443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: central-allow-dns
  namespace: ethio-connect-central
  labels:
    ethio-connect/tenant: central
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: central-allow-metrics
  namespace: ethio-connect-central
  labels:
    ethio-connect/tenant: central
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 9090
