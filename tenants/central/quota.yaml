apiVersion: v1
kind: ResourceQuota
metadata:
  name: central-tenant-quota
  namespace: ethio-connect-central
  labels:
    ethio-connect/tenant: central
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    pods: "50"
    services: "20"
    persistentvolumeclaims: "10"
    secrets: "100"
    configmaps: "50"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: central-tenant-limits
  namespace: ethio-connect-central
  labels:
    ethio-connect/tenant: central
spec:
  limits:
  - type: Container
    default:
      cpu: 500m
      memory: 512Mi
    defaultRequest:
      cpu: 100m
      memory: 128Mi
    max:
      cpu: "2"
      memory: 4Gi
    min:
      cpu: 50m
      memory: 64Mi
  - type: Pod
    max:
      cpu: "4"
      memory: 8Gi
