nameOverride: central-hub-api
image:
  repository: ghcr.io/ethio-connect-ethiopia/central-hub-api
  tag: "last"
envFrom:
  configMaps:
    - ethio-connect-runtime-config
  secrets:
    - ethio-connect-runtime-secrets
ingress:
  hosts:
    - host: hub-api.ethioconnect.et
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: ethioconnect-et-wildcard-tls
      hosts:
        - hub-api.ethioconnect.et
