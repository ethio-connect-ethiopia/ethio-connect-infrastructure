nameOverride: central-hub-api
image:
  repository: ghcr.io/primewale/central-hub-api
  tag: "development"
envFrom:
  configMaps:
    - ethio-connect-runtime-config
  secrets:
    - ethio-connect-runtime-secrets
ingress:
  hosts:
    - host: dev-hub-api.ethioconnect.et
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: ethioconnect-et-wildcard-tls
      hosts:
        - dev-hub-api.ethioconnect.et
