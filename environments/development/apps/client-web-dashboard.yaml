nameOverride: client-web-dashboard
image:
  repository: ghcr.io/primewale/client-web-dashboard
  tag: "development"
envFrom:
  configMaps: []
  secrets: []
ingress:
  hosts:
    - host: dev-client.ethioconnect.et
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: ethioconnect-et-wildcard-tls
      hosts:
        - dev-client.ethioconnect.et
