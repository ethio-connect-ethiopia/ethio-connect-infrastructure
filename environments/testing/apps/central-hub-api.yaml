nameOverride: central-hub-api
image:
  repository: ghcr.io/ethio-connect-ethiopia/central-hub-api
  tag: "testing-990ec590617a"
envFrom:
  configMaps:
    - ethio-connect-runtime-config
  secrets:
    - ethio-connect-runtime-secrets
ingress:
  annotations:
    cert-manager.io/cluster-issuer: ca-issuer
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  hosts:
    - host: testing-hub-api.ethioconnect.et
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: central-hub-api-tls
      hosts:
        - testing-hub-api.ethioconnect.et
