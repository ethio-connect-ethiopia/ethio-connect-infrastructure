apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: public
  namespace: argocd
spec:
  description: Public entrypoint workloads across clusters and environments.
  sourceRepos:
    - https://github.com/ethio-connect-ethiopia/ethio-connect.git
  destinations:
    - server: '*'
      namespace: ethio-connect-*
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
