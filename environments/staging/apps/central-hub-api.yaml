nameOverride: central-hub-api
image:
  repository: ghcr.io/ethio-connect-ethiopia/central-hub-api
  tag: "staging"
envFrom:
  configMaps:
    - ethio-connect-runtime-config
  secrets:
    - ethio-connect-runtime-secrets
ingress:
  annotations:
    cert-manager.io/cluster-issuer: ca-issuer
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  hosts:
    - host: staging-hub-api.ethioconnect.et
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: staging-hub-api-tls
      hosts:
        - staging-hub-api.ethioconnect.et

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 128Mi

replicaCount: 1
