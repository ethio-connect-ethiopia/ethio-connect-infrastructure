nameOverride: vendor-web-dashboard
image:
  repository: ghcr.io/ethio-connect-ethiopia/vendor-web-dashboard
  tag: "staging"
envFrom:
  secrets:
    - ethio-connect-runtime-secrets
env:
  - name: NODE_ENV
    value: "production"
  - name: APP_ENV
    value: "staging"
  - name: APP_NAME
    value: "@ethio-connect/vendor-web-dashboard"
  - name: APP_PORT
    value: "3004"
  - name: APP_BASE_URL
    value: "https://staging-vendor.ethioconnect.et"
  - name: NEXTAUTH_URL
    value: "https://staging-vendor.ethioconnect.et"
  - name: NEXT_PUBLIC_APP_NAME
    value: "@ethio-connect/vendor-web-dashboard"
  - name: NEXT_PUBLIC_APP_URL
    value: "https://staging-vendor.ethioconnect.et"
  - name: NEXT_PUBLIC_ENVIRONMENT
    value: "staging"
  - name: NEXT_PUBLIC_API_URL
    value: "https://staging-vendor-api.ethioconnect.et/api"
  - name: NEXT_PUBLIC_APP_VERSION
    value: "0.1.0-staging"
  - name: NEXT_PUBLIC_AUTH_CLIENT_ID
    value: ""
  - name: NEXT_PUBLIC_AUTH_ISSUER
    value: ""
  - name: NEXT_PUBLIC_AUTH_REDIRECT_URI
    value: "https://staging-vendor.ethioconnect.et/api/auth/callback"
  - name: LOG_LEVEL
    value: "info"
  - name: ENABLE_DEBUG_LOGS
    value: "true"
  - name: ENABLE_REQUEST_LOGGING
    value: "true"
  - name: NEXT_PUBLIC_SENTRY_DSN
    value: ""
  - name: OTEL_EXPORTER_OTLP_ENDPOINT
    value: ""
  - name: JWT_EXPIRES_IN
    value: "1h"
  - name: CORS_ORIGINS
    value: "https://staging-vendor.ethioconnect.et,https://staging-vendor-api.ethioconnect.et"
  - name: API_TIMEOUT_MS
    value: "30000"
  - name: FEATURE_FLAGS
    value: "core_dashboard,notifications"
  - name: NEXT_PUBLIC_APP_COMMIT_SHA
    value: "local"
ingress:
  annotations:
    cert-manager.io/cluster-issuer: ca-issuer
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: staging-vendor.ethioconnect.et
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: staging-vendor-dashboard-tls
      hosts:
        - staging-vendor.ethioconnect.et
