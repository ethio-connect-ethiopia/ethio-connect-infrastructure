image:
  repository: ghcr.io/primewale/central-hub-api
  tag: "staging"
  pullPolicy: IfNotPresent

ingress:
  hosts:
    - host: staging-hub-api.ethioconnect.et
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: ethioconnect-et-wildcard-tls
      hosts:
        - staging-hub-api.ethioconnect.et

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi
