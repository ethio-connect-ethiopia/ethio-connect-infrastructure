image:
  repository: ghcr.io/ethio-connect-ethiopia/central-hub-api
  tag: "staging"
  pullPolicy: IfNotPresent

ingress:
  annotations:
    cert-manager.io/cluster-issuer: ca-issuer
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: staging-hub-api.ethioconnect.et
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: staging-hub-api-tls
      hosts:
        - staging-hub-api.ethioconnect.et

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi
