apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: vendor-services
  namespace: argocd
  labels:
    app.kubernetes.io/name: vendor-services
    ethio-connect/project: provider
spec:
  generators:
  - git:
      repoURL: https://github.com/ethio-connect-ethiopia/ethio-connect-infrastructure.git
      revision: HEAD
      directories:
      - path: environments/testing/apps
        repos:
        - https://github.com/ethio-connect-ethiopia/ethio-connect-infrastructure.git
      - path: environments/staging/apps
        repos:
        - https://github.com/ethio-connect-ethiopia/ethio-connect-infrastructure.git
      - path: environments/prod/apps
        repos:
        - https://github.com/ethio-connect-ethiopia/ethio-connect-infrastructure.git
      - path: environments/development/apps
        repos:
        - https://github.com/ethio-connect-ethiopia/ethio-connect-infrastructure.git
  template:
    metadata:
      name: "{{path[2]}}-{{path.basename}}"
    spec:
      project: provider
      source:
        repoURL: https://github.com/ethio-connect-ethiopia/ethio-connect-infrastructure.git
        targetRevision: HEAD
        path: "environments/{{path.basename}}/apps/{{path[2]}}-{{path.basename}}.yaml"
      destination:
        server: https://kubernetes.default.svc
        namespace: ethio-connect-provider
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
