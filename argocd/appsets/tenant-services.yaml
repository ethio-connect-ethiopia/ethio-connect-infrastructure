apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tenant-services
  namespace: argocd
  labels:
    app.kubernetes.io/name: tenant-services
    app.kubernetes.io/part-of: ethio-connect
    ethio-connect/project: tenant
spec:
  generators:
  - matrix:
      generators:
      - clusters:
          values:
            metadata:
              name: "{{ name }}"
              labels:
                environment: "{{ metadata.labels.environment }}"
        selector:
          matchLabels:
            kubernetes.io/cluster: managed
      - git:
          repoURL: https://github.com/ethio-connect-ethiopia/ethio-connect-infrastructure.git
          revision: HEAD
          directories:
          - path: environments/*/apps/client-api-server.yaml
          - path: environments/*/apps/client-web-dashboard.yaml
          values:
            environment: "{{ path[11] }}"
            appName: "{{ path.basename }}"
  template:
    metadata:
      name: "{{ values.appName }}-{{ values.environment }}"
      labels:
        app.kubernetes.io/name: "{{ values.appName }}"
        ethio-connect/project: tenant
        ethio-connect/environment: "{{ values.environment }}"
    spec:
      project: tenant
      source:
        repoURL: https://github.com/ethio-connect-ethiopia/ethio-connect-infrastructure.git
        targetRevision: "{{ values.metadata.labels.environment }}"
        path: environments/{{ values.environment }}/apps/{{ values.appName }}.yaml
      destination:
        server: "{{ values.metadata.name }}"
        namespace: ethio-connect-tenant
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
        - PrunePropagationPolicy=foreground
      revisionHistoryLimit: 10
