apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: client-services
  namespace: argocd
  labels:
    app.kubernetes.io/name: client-services
    ethio-connect/project: tenant
spec:
  generators:
  - list:
      elements:
      - env: testing
        app: api-server
        path: environments/testing/apps/client-api-server.yaml
      - env: testing
        app: web-dashboard
        path: environments/testing/apps/client-web-dashboard.yaml
      - env: staging
        app: api-server
        path: environments/staging/apps/client-api-server.yaml
      - env: staging
        app: web-dashboard
        path: environments/staging/apps/client-web-dashboard.yaml
      - env: prod
        app: api-server
        path: environments/prod/apps/client-api-server.yaml
      - env: prod
        app: web-dashboard
        path: environments/prod/apps/client-web-dashboard.yaml
  template:
    metadata:
      name: "client-{{env}}-{{app}}"
    spec:
      project: tenant
      sources:
      - chart: ethio-connect-app
        repoURL: https://github.com/ethio-connect-ethiopia/ethio-connect-infrastructure.git
        targetRevision: "0.1.0"
        helm:
          valueFiles:
          - "{{path}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: ethio-connect-tenant
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
