apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: central-hub-api
  namespace: argocd
  labels:
    app.kubernetes.io/name: central-hub-api
    ethio-connect/project: central
spec:
  generators:
  - git:
      repoURL: https://github.com/ethio-connect-ethiopia/ethio-connect-infrastructure.git
      revision: HEAD
      files:
      - path: environments/testing/apps/central-hub-api.yaml
      - path: environments/staging/apps/central-hub-api.yaml
      - path: environments/prod/apps/central-hub-api.yaml
  template:
    metadata:
      name: "central-hub-api-{{path[1]}}"
    spec:
      project: central
      source:
        repoURL: https://github.com/ethio-connect-ethiopia/ethio-connect-infrastructure.git
        targetRevision: HEAD
        path: "{{path}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: ethio-connect-central
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
