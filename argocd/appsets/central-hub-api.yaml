apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: central-hub-api
  namespace: argocd
  labels:
    app.kubernetes.io/name: central-hub-api
    app.kubernetes.io/part-of: ethio-connect
    ethio-connect/project: central
spec:
  generators:
  - matrix:
      generators:
      - clusters:
          values:
            metadata:
              name: "{{ name }}"
              labels:
                environment: "{{ metadata.labels.environment }}"
                region: "{{ metadata.labels.region }}"
        selector:
          matchLabels:
            kubernetes.io/cluster: managed
      - git:
          repoURL: https://github.com/ethio-connect-ethiopia/ethio-connect-infrastructure.git
          revision: HEAD
          directories:
          - path: environments/*/apps/central-hub-api.yaml
          values:
            environment: "{{ path[11] }}"
  template:
    metadata:
      name: central-hub-api-{{ values.environment }}
      labels:
        app.kubernetes.io/name: central-hub-api
        ethio-connect/project: central
        ethio-connect/environment: "{{ values.environment }}"
    spec:
      project: central
      source:
        repoURL: https://github.com/ethio-connect-ethiopia/ethio-connect-infrastructure.git
        targetRevision: "{{ values.metadata.labels.environment }}"
        path: environments/{{ values.environment }}/apps/central-hub-api.yaml
      destination:
        server: "{{ values.metadata.name }}"
        namespace: ethio-connect-central
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
        - CreateNamespace=true
        - PrunePropagationPolicy=foreground
        - ApplyOutOfSync=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
        ignoreDifferences:
        - group: apps
          kind: Deployment
          jsonPointers:
          - /spec/replicas
      revisionHistoryLimit: 10
      info:
      - name: Description
        value: Central Hub API service
