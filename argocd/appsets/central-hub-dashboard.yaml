apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: central-hub-dashboard
  namespace: argocd
  labels:
    app.kubernetes.io/name: central-hub-dashboard
    ethio-connect/project: central
spec:
  generators:
  - list:
      elements:
      - env: testing
        path: environments/testing/apps/central-hub-dashboard.yaml
      - env: staging
        path: environments/staging/apps/central-hub-dashboard.yaml
      - env: prod
        path: environments/prod/apps/central-hub-dashboard.yaml
  template:
    metadata:
      name: "central-hub-dashboard-{{env}}"
    spec:
      project: central
      sources:
      - chart: ethio-connect-app
        repoURL: https://github.com/ethio-connect-ethiopia/ethio-connect-infrastructure.git
        targetRevision: "0.1.0"
        helm:
          valueFiles:
          - "{{path}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: ethio-connect-central
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
